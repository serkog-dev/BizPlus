[build]
builder = "nixpacks"
buildCommand = "cd ../.. && npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter api run build && cd apps/api && npx prisma generate"

[deploy]
startCommand = "npx prisma migrate deploy && node dist/src/main.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
